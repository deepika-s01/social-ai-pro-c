<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SocialAI Pro</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-main);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #E5E7EB;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748B;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .flex-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1F2937;
        }

        .forgot-pass {
            font-size: 0.75rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-google {
            width: 100%;
            background: white;
            border: 1px solid #E5E7EB;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            margin-top: 20px;
        }

        .btn-google:hover {
            background: #F8FAFC;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #E2E8F0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="logo">SocialAI Pro</a>
        <h2 style="margin-bottom: 5px;">Welcome back</h2>
        <p class="subtitle">Enter your credentials to access your dashboard.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@gmail.com" required>
            </div>

            <div class="form-group">
                <div class="flex-label">
                    <label for="password">Password</label>
                    <a href="#" class="forgot-pass">Forgot password?</a>
                </div>
                <input type="password" id="password" placeholder="••••••" required>
            </div>

           <button type="button" 
                onclick="handleLogin()" 
                style="width: 100%; border:none; padding: 14px; border-radius: 10px; font-weight: 700; cursor:pointer; background-color: #7C3AED; color: white;">
                Sign In
            </button>
        </form>  

        <p style="margin-top: 25px; font-size: 0.875rem; color: #64748B;">
            Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create one</a>
        </p>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple validation
            if(!email || !password) {
                return alert("Please enter both email and password.");
            }

            try {
                // Connect to your Flask Backend (app.py)
                const response = await fetch('http://127.0.0.1:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.status === "success") {
                    // Save name to memory so Dashboard can say "Welcome, Name"
                    localStorage.setItem('userName', result.user.name);
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Show error from backend (e.g., "Invalid credentials")
                    alert(result.message);
                }
            } catch (error) {
                console.error("Connection Error:", error);
                alert("Cannot connect to backend. Is app.py running in VS Code?");
            }
        }
    </script>

</body>
</html>
