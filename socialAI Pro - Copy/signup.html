<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SocialAI Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #F8FAFC; font-family: 'Inter', sans-serif; }
        .signup-container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); border: 1px solid #E5E7EB; width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 26px; font-weight: 800; color: #7C3AED; text-decoration: none; display: block; margin-bottom: 10px; }
        .subtitle { color: #64748B; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; color: #1F2937; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #E2E8F0; box-sizing: border-box; }
        .signup-btn { width: 100%; border:none; padding: 14px; border-radius: 10px; font-weight: 700; cursor:pointer; background-color: #7C3AED; color: white; margin-top: 10px; transition: 0.3s; }
        .signup-btn:hover { background-color: #6D28D9; }
    </style>
</head>
<body>

    <div class="signup-container">
        <a href="index.html" class="logo">SocialAI Pro</a>
        <h2>Create your account</h2>
        <p class="subtitle">Join the future of social media management.</p>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Name">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="user@gmail.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button type="button" class="signup-btn" onclick="handleSignup()">Create Account</button>
        
        <p style="margin-top: 25px; font-size: 0.875rem; color: #64748B;">
            Already have an account? <a href="login.html" style="color: #7C3AED; font-weight: 600; text-decoration: none;">Log in</a>
        </p>
    </div>

    <script>
        async function handleSignup() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!name || !email || !password) {
                alert("Please fill all fields");
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const result = await response.json();

                if (result.status === "success") {
                    // 1. Save info
                    localStorage.setItem('userName', name);
                    
                    // 2. Clear visual
                    console.log("Signup success, redirecting...");
                    
                    // 3. Jump to dashboard
                    window.location.replace("dashboard.html");
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Backend is not running! Start app.py first.");
            }
        }
    </script>
</body>
</html>
